repos:
-   repo: https://github.com/psf/black
    rev: 23.11.0  # Match the locally installed version
    hooks:
    -   id: black
        # Remove args since we use pyproject.toml for configuration
        exclude: ^ExampleTests/generatedTests/.*$
        # Only run on changed files
        stages: [pre-commit]

-   repo: https://github.com/pycqa/flake8
    rev: 6.0.0  # Choose the appropriate version
    hooks:
    -   id: flake8
        additional_dependencies: [
            'flake8-docstrings',
            'flake8-bugbear',
            'flake8-comprehensions',
        ]
        exclude: ^(ExampleTests/generatedTests/|ExampleTests/pythonTestPrograms/).*$ 
        # Only run on changed files
        stages: [pre-commit]
        # This ensures flake8 only runs on files being committed
        pass_filenames: true
        # Optional: specify file types to check
        types: [python]

-   repo: local
    hooks:
    -   id: pytest-check
        name: pytest-check
        entry: python3 -m pytest -q --ignore=backend/python-test-cases
        language: system
        pass_filenames: false
        stages: [pre-commit]