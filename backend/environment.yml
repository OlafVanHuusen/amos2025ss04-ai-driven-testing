name: backend
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - requests
  - tqdm
  - uvicorn
  - pytest
  - black=25.1.0  # Keep in sync with requirements-dev.txt and .pre-commit-config.yaml
  - flake8=7.0.0  # Keep in sync with requirements-dev.txt
  - transformers
  - mccabe
  - python-graphviz
  - pip
  - pip:
      - docker  # Was docker-py in conda, but docker is the correct pip package
      - fastapi>=0.115.1
      - langchain
      - langchain-community
      - langchain-ollama
      - langchain-chroma
      - langchain-text-splitters
      - keybert
      - beautifulsoup4
      - py2cfg
      - staticfg

